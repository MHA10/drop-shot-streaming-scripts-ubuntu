name: "publish to npm"
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: node
        uses: actions/setup-node@v2
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: bump version
        run: |
          set -e
          # Get the current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Calculate the next patch version as a candidate
          CANDIDATE_VERSION=$(node -p "const v=require('./package.json').version.split('.'); v[2] = Number(v[2])+1; v.join('.')")
          
          # Check if a git tag for this version already exists
          # If it does, keep incrementing the patch version until we find an unused one
          while git rev-parse "refs/tags/v$CANDIDATE_VERSION" >/dev/null 2>&1; do
            echo "Tag v$CANDIDATE_VERSION already exists, trying next patch version..."
            CANDIDATE_VERSION=$(node -p "const v='$CANDIDATE_VERSION'.split('.'); v[2] = Number(v[2])+1; v.join('.')")
          done
          
          echo "Bumping version to $CANDIDATE_VERSION"
          
          # Update package.json and create the git tag
          npm version "$CANDIDATE_VERSION" -m "Bump version to %s [skip ci]"
          git push --follow-tags

      - name: build
        run: npm install && npm run build

      - name: publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_AUTH_TOKEN}}

      - name: notify server
        run: |
          # Get the new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          
          # Notify server about successful deployment
          curl -X POST "${{ secrets.DEPLOYMENT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "package_published",
              "package_name": "'$PACKAGE_NAME'",
              "version": "'$NEW_VERSION'",
              "repository": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
              "actor": "${{ github.actor }}"
            }' || echo "Failed to notify server, but deployment was successful"
